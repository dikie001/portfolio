<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="dashboard-body">
    <!-- Global Loader Overlay -->
    <div id="global-loader" class="loader-overlay hidden">
        <div class="premium-loader">
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="center-pulse"></div>
        </div>
        <p class="loading-text" id="loader-text">Authenticating</p>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Dickens Portal</h2>
        </div>
        <nav>
            <ul class="nav-links">
                <li>
                    <a href="dashboard.html" id="dashboard-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="projects.html" id="projects-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Projects
                    </a>
                </li>
                <li>
                    <a href="messages.html" id="messages-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        Messages
                    </a>
                </li>
                <li>
                    <a href="visitors.html" id="visitors-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        Visitors
                    </a>
                </li>
                <li>
                    <a href="analytics.html" id="analytics-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        Analytics
                    </a>
                </li>
                <li class="active">
                    <a href="settings.html" id="settings-nav">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        Settings
                    </a>
                </li>
            </ul>
        </nav>
        <button id="logout-btn" class="btn btn-outline logout-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <nav class="top-navbar fade-in">
            <div class="view-info">
                <h2 id="current-view-title">System Settings</h2>
            </div>
            <div class="navbar-actions">
                <div class="notification-bell">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </div>
                <div class="user-profile-wrapper" id="profile-trigger">
                    <div class="user-profile">
                        <div class="avatar-wrapper">
                            <img id="user-avatar" src="../images/logo.png" alt="Admin">
                        </div>
                        <span id="user-name">Admin</span>
                        <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <!-- Profile Dropdown -->
                    <div class="profile-dropdown hidden" id="profile-dropdown">
                        <div class="dropdown-header">
                            <img id="dropdown-avatar" src="../images/logo.png" alt="Admin">
                            <div class="dropdown-info">
                                <h4 id="dropdown-name">Admin User</h4>
                                <p id="dropdown-email">admin@example.com</p>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <ul class="dropdown-menu">
                            <li><a href="settings.html">Settings</a></li>
                            <li class="divider"></li>
                            <li><button id="dropdown-logout-btn">Sign out</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Settings View -->
        <div id="settings-view">
            <header class="content-header fade-in">
                <div>
                    <p>Manage your account and site preferences.</p>
                </div>
            </header>

            <div class="data-card fade-in" style="max-width: 500px;">
                <div class="card-header">
                    <h2>Update Password</h2>
                </div>
                <form id="settings-form">
                    <div class="input-group">
                        <input type="password" id="new-password" required placeholder=" ">
                        <label for="new-password">New Password</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirm-password" required placeholder=" ">
                        <label for="confirm-password">Confirm New Password</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="update-password-btn">
                        <span class="btn-text">Update Password</span>
                        <span class="loader hidden"></span>
                    </button>
                    <p id="settings-msg" class="error-message hidden"></p>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
