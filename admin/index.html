<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dickens Omondi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
    <div class="login-container fade-in">
            <div class="login-card">
                <div class="login-header">
                    <a href="../index.html" class="back-link">&larr; Back to Site</a>
                    <h1>Admin Portal</h1>
                    <p>Welcome back, Dickens.</p>
                </div>
                <div id="login-actions">
                    <button type="button" class="btn btn-primary w-100" id="login-btn">
                        <span class="btn-text">Sign in with Google</span>
                        <span class="loader hidden"></span>
                    </button>
                    <div class="auth-extras">
                        <p id="login-error" class="error-message hidden"></p>
                    </div>
                </div>
            </div>

    </div>

    <script type="module">
        import { auth, googleProvider } from '../firebase-config.js';
        import { 
            signInWithPopup,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const btnText = loginBtn.querySelector('.btn-text');
        const loader = loginBtn.querySelector('.loader');

        // Check if already logged in and has admin claim
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const idTokenResult = await user.getIdTokenResult();
                if (idTokenResult.claims.admin) {
                    window.location.href = 'dashboard.html';
                } else {
                    loginError.textContent = "Access Denied: You do not have admin privileges.";
                    loginError.classList.remove('hidden');
                    await signOut(auth);
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const idTokenResult = await result.user.getIdTokenResult();
                
                if (idTokenResult.claims.admin) {
                    window.location.href = 'dashboard.html';
                } else {
                    // Force refresh token once in case claim was just assigned
                    const freshToken = await result.user.getIdTokenResult(true);
                    if (freshToken.claims.admin) {
                        window.location.href = 'dashboard.html';
                    } else {
                        throw new Error("You do not have admin privileges.");
                    }
                }
            } catch (error) {
                console.error(error);
                loginError.textContent = error.message;
                loginError.classList.remove('hidden');
                
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                loginBtn.disabled = false;
                await signOut(auth);
            }
        });
    </script>

</body>
</html>
