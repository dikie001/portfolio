<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dickens Omondi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
    <div class="login-container fade-in">
        <!-- Global Loader Overlay -->
        <div id="global-loader" class="loader-overlay hidden">
            <div class="premium-loader">
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="center-pulse"></div>
            </div>
            <p class="loading-text" id="loader-text">Authenticating</p>
        </div>

        <div class="login-card">
            <div class="login-header">
                <a href="../index.html" class="back-link">&larr; Back to Site</a>
                <h1>Admin Portal</h1>
                <p>Welcome back, Dickens.</p>
            </div>
            <div id="login-actions">
                <button type="button" class="btn btn-primary w-100" id="login-btn">
                    <span class="btn-text">Sign in with Google</span>
                    <span class="loader hidden"></span>
                </button>
                <div class="auth-extras">
                    <p id="login-error" class="error-message hidden"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, googleProvider } from '../firebase-config.js';
        import { 
            signInWithPopup,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            doc,
            getDoc,
            setDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const btnText = loginBtn.querySelector('.btn-text');
        const loader = loginBtn.querySelector('.loader');
        const globalLoader = document.getElementById('global-loader');

        function showLoading(text = "Authenticating...") {
            document.getElementById('loader-text').textContent = text;
            globalLoader.classList.remove('hidden');
        }

        function hideLoading() {
            globalLoader.classList.add('hidden');
        }

        // Check if already logged in and matches designated admin
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                showLoading("Verifying Admin Status...");
                try {
                    const adminDoc = await getDoc(doc(db, 'config', 'admin'));
                    
                    if (!adminDoc.exists()) {
                        // NO ADMIN YET - This user becomes the admin
                        await setDoc(doc(db, 'config', 'admin'), {
                            uid: user.uid,
                            email: user.email,
                            assignedAt: new Date()
                        });
                        window.location.href = 'projects.html';
                    } else if (adminDoc.data().uid === user.uid) {
                        // Matches current admin
                        window.location.href = 'projects.html';
                    } else {
                        // Access Denied
                        throw new Error("Access Denied: Administrator already assigned.");
                    }
                } catch (error) {
                    console.error(error);
                    loginError.textContent = error.message;
                    loginError.classList.remove('hidden');
                    await signOut(auth);
                    hideLoading();
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            showLoading("Connecting to Google...");
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                await signInWithPopup(auth, googleProvider);
                // The onAuthStateChanged listener above will handle the logic
            } catch (error) {
                console.error(error);
                loginError.textContent = error.message;
                loginError.classList.remove('hidden');
                loginBtn.disabled = false;
                hideLoading();
            }
        });
    </script>
</body>
</html>
