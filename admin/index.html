<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dickens Omondi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
    <div class="login-container fade-in">
        <div class="login-card">
            <div class="login-header">
                <a href="../index.html" class="back-link">&larr; Back to Site</a>
                <h1>Admin Portal</h1>
                <p>Welcome back, Dickens.</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="loader hidden"></span>
                </button>
                <div class="auth-extras">
                    <p id="login-error" class="error-message hidden"></p>
                    <a href="#" id="toggle-auth" style="display: block; margin-top: 1rem; font-size: 0.8rem; color: var(--text-light); text-align: center; opacity: 0.5;">Need to create an account?</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth } from '../firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const toggleAuth = document.getElementById('toggle-auth');
        const btnText = loginBtn.querySelector('.btn-text');
        const loader = loginBtn.querySelector('.loader');

        let isLogin = true;

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            btnText.textContent = isLogin ? 'Sign In' : 'Create Account';
            toggleAuth.textContent = isLogin ? 'Need to create an account?' : 'Back to Sign In';
            document.querySelector('h1').textContent = isLogin ? 'Admin Portal' : 'Create Admin';
        });

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                loginError.textContent = error.message.includes('auth/email-already-in-use') 
                    ? "Email already exists." 
                    : "Action failed. Check credentials or Firebase rules.";
                loginError.classList.remove('hidden');
                
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
