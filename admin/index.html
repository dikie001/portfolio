<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/logo.png">
    <link rel="apple-touch-icon" href="../images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
    <div class="login-container fade-in">
        <!-- Global Loader Overlay -->
        <div id="global-loader" class="loader-overlay hidden">
            <div class="premium-loader">
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="center-pulse"></div>
            </div>
            <p class="loading-text" id="loader-text">Authenticating</p>
        </div>

        <div class="login-card">
            <div class="login-header">
                <a href="../" class="back-link">&larr; Back to Site</a>
                <h1>Admin Portal</h1>
                <p>Welcome back, Dickens.</p>
            </div>
            <div id="login-actions">
                <button type="button" class="btn btn-primary w-100" id="login-btn">
                    <div class="google-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </div>
                    <span class="btn-text">Sign in with Google</span>
                    <span class="loader hidden"></span>
                </button>
                <div class="auth-extras">
                    <p id="login-error" class="error-message hidden"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, googleProvider } from '../firebase-config.js';
        import { 
            signInWithPopup,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            doc,
            getDoc,
            setDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const btnText = loginBtn.querySelector('.btn-text');
        const loader = loginBtn.querySelector('.loader');
        const globalLoader = document.getElementById('global-loader');

        function showLoading(text = "Authenticating...") {
            document.getElementById('loader-text').textContent = text;
            globalLoader.classList.remove('hidden');
        }

        function hideLoading() {
            globalLoader.classList.add('hidden');
        }

        // Check if already logged in and matches designated admin
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                showLoading("Verifying Admin Status...");
                try {
                    const adminDoc = await getDoc(doc(db, 'config', 'admin'));
                    
                    if (!adminDoc.exists()) {
                        // NO ADMIN YET - This user becomes the admin
                        await setDoc(doc(db, 'config', 'admin'), {
                            uid: user.uid,
                            email: user.email,
                            assignedAt: new Date()
                        });
                        window.location.href = 'dashboard.html';
                    } else if (adminDoc.data().uid === user.uid) {
                        // Matches current admin
                        window.location.href = 'dashboard.html';
                    } else {
                        // Access Denied
                        throw new Error("Access Denied: Administrator already assigned.");
                    }
                } catch (error) {
                    console.error(error);
                    loginError.textContent = error.message;
                    loginError.classList.remove('hidden');
                    await signOut(auth);
                    hideLoading();
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            showLoading("Connecting to Google...");
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                await signInWithPopup(auth, googleProvider);
                // The onAuthStateChanged listener above will handle the logic
            } catch (error) {
                console.error(error);
                loginError.textContent = error.message;
                loginError.classList.remove('hidden');
                loginBtn.disabled = false;
                hideLoading();
            }
        });
    </script>
</body>
</html>
